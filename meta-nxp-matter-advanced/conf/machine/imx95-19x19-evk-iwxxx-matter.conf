#@TYPE: Machine
#@NAME: i.MX 95 19x19 Consolidated Machine For Matter
#@DESCRIPTION: A consolidated machine for i.MX 95 19x19 LPDDR5 EVK Matter demos
#@MAINTAINER: Haoran Wang <elven.wang@nxp.com>

MACHINEOVERRIDES =. "imx95-19x19-lpddr5-evk.conf:"
require conf/machine/imx95-19x19-lpddr5-evk.conf

UBOOT_DELTA_CONFIG="${UNPACKDIR}/uboot-config/*"

IMAGE_INSTALL:append = " packagegroup-nxp-matter-baseline packagegroup-nxp-openthread packagegroup-nxp-otbr packagegroup-nxp-zigbee-rcp docker-moby "

# Set to true to enable EdgeLock Enclave
USE_ELE = "true"
